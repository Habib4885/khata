<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Khata App</title>
    
    <!-- PWA Mobile App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    
    <!-- App Icons -->
    <link class="rounded-2xl" rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2691/2691522.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2691/2691522.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .custom-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen text-gray-800">

    <!-- LOGIN SCREEN CONTAINER -->
    <div id="loginScreen" class="flex items-center justify-center min-h-screen bg-gray-100 p-4">
        <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm border border-gray-100">
            <div class="text-center mb-6">
                <div class="bg-blue-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-3 text-blue-600 text-3xl">👤</div>
                <h2 class="text-xl font-black text-gray-800 tracking-wide">Team Control Room</h2>
                <p class="text-xs text-gray-400 mt-1">Apna account login karein</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider">Email Address</label>
                    <input type="email" id="loginEmail" required class="w-full p-3 border border-gray-200 rounded-xl mt-1 focus:outline-none focus:border-blue-500 text-sm" placeholder="operator@team.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider">Password</label>
                    <input type="password" id="loginPassword" required class="w-full p-3 border border-gray-200 rounded-xl mt-1 focus:outline-none focus:border-blue-500 text-sm" placeholder="••••••••">
                </div>
                <button type="submit" id="btnLoginSubmit" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 active:scale-[0.98] transition text-sm shadow-md shadow-blue-100">
                    Sign In / Login
                </button>
            </form>
        </div>
    </div>

    <!-- MAIN KHATA INTERFACE -->
    <div id="mainInterface" class="hidden pb-12">
        <!-- Header -->
        <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-40 flex justify-between items-center">
            <span class="text-base font-black tracking-wide">🚀 TEAM KHATA APP</span>
            <div class="flex items-center space-x-2">
                <span id="lblUserEmail" class="text-xs bg-blue-700 px-2.5 py-1 rounded-lg font-bold"></span>
                <button id="btnLogout" class="bg-red-500 text-white px-2 py-1 rounded-lg text-xs font-bold active:scale-95 transition">Logout</button>
            </div>
        </header>

        <!-- CASH ENDORSEMENT MODAL -->
        <div id="endorseModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4 backdrop-blur-xs">
            <div class="bg-white p-5 rounded-2xl shadow-xl w-full max-w-sm">
                <h3 class="text-base font-black text-gray-800 mb-2">💰 Cash Endorsement</h3>
                <p class="text-xs text-gray-500 mb-4">Meharbani karke tasdeeq karein ke paise kisne jama karwaye hain:</p>
                <input type="hidden" id="endorseDocId">
                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-600 mb-1">Paid By</label>
                    <select id="paidBySelect" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 font-bold text-sm bg-gray-50">
                        <option value="mustafa">mustafa</option>
                        <option value="Shazad">Shazad</option>
                        <option value="Habib">Habib</option>
                        <option value="Hamza">Hamza</option>
                    </select>
                </div>
                <div class="flex space-x-2 justify-end text-xs">
                    <button onclick="closeEndorseModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2.5 rounded-xl font-bold">Cancel</button>
                    <button onclick="submitEndorsement()" class="bg-green-600 text-white px-4 py-2.5 rounded-xl font-bold active:scale-95 transition">Verify & Lock Cash</button>
                </div>
            </div>
        </div>

        <!-- MAIN CONTAINER -->
        <div class="max-w-md mx-auto p-3 space-y-4">
            
            <!-- SUMMARY WIDGETS -->
            <div class="flex space-x-2 overflow-x-auto pb-1 custom-scroll snap-x">
                <div class="bg-white border border-gray-100 p-3 rounded-xl shadow-xs min-w-[125px] flex-1 snap-start cursor-pointer" onclick="filterTable('all')">
                    <p class="text-[10px] uppercase font-bold text-gray-400">Verified Profit</p>
                    <p id="totalProfitDisplay" class="text-sm font-black text-green-600 mt-0.5">Rs. 0</p>
                </div>
                <div class="bg-white border border-gray-100 p-3 rounded-xl shadow-xs min-w-[125px] flex-1 snap-start cursor-pointer" onclick="filterTable('pending_cash')">
                    <p class="text-[10px] uppercase font-bold text-gray-400">Kacha Cash</p>
                    <p id="totalPendingCashDisplay" class="text-sm font-black text-amber-500 mt-0.5">Rs. 0</p>
                </div>
                <div class="bg-white border border-gray-100 p-3 rounded-xl shadow-xs min-w-[125px] flex-1 snap-start cursor-pointer" onclick="filterTable('dues')">
                    <p class="text-[10px] uppercase font-bold text-gray-400">Total Dues</p>
                    <p id="totalBalanceDisplay" class="text-sm font-black text-red-500 mt-0.5">Rs. 0</p>
                </div>
                <div class="bg-white border border-gray-100 p-3 rounded-xl shadow-xs min-w-[125px] flex-1 snap-start cursor-pointer" onclick="filterTable('expense')">
                    <p class="text-[10px] uppercase font-bold text-gray-400">Expenses</p>
                    <p id="totalExpenseDisplay" class="text-sm font-black text-gray-700 mt-0.5">Rs. 0</p>
                </div>
            </div>

            <!-- FORM CARD -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                <div class="flex mb-4 bg-gray-50 p-1 rounded-xl border">
                    <button id="tabClient" onclick="switchTab('client')" class="w-1/2 py-2 text-xs font-black text-center rounded-lg bg-white text-blue-600 shadow-xs transition">👤 Client Form</button>
                    <button id="tabExpense" onclick="switchTab('expense')" class="w-1/2 py-2 text-xs font-bold text-center rounded-lg text-gray-500 transition">💸 Kharcha</button>
                </div>

                <form id="khataForm" class="space-y-3 text-xs">
                    <input type="hidden" id="formType" value="client">
                    <input type="hidden" id="editDocId" value="">

                    <!-- Client Fields -->
                    <div id="clientFields" class="space-y-3">
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="font-bold text-gray-500">Tareekh / Date</label>
                                <input type="date" id="clientDate" required class="w-full p-2.5 border border-gray-200 bg-gray-50 rounded-xl mt-1 font-bold focus:outline-none">
                            </div>
                            <div>
                                <label class="font-bold text-gray-500">Gahak ka Naam</label>
                                <input type="text" id="clientName" required class="w-full p-2.5 border border-gray-200 rounded-xl mt-1 focus:outline-none">
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="font-bold text-gray-500">ID Card (CNIC)</label>
                                <input type="text" id="cnic" class="w-full p-2.5 border border-gray-200 rounded-xl mt-1 focus:outline-none" placeholder="Optional">
                            </div>
                            <div>
                                <label class="font-bold text-gray-500">Tracking ID</label>
                                <input type="text" id="trackingId" class="w-full p-2.5 border border-gray-200 rounded-xl mt-1 focus:outline-none" placeholder="Optional">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="font-bold text-gray-500">Mobile Number</label>
                                <input type="text" id="mobileNumber" class="w-full p-2.5 border border-gray-200 rounded-xl mt-1 focus:outline-none" placeholder="03001234567">
                            </div>
                            <div>
                                <label class="font-bold text-purple-700">Password / Key</label>
                                <input type="text" id="recordPassword" class="w-full p-2.5 border border-purple-200 rounded-xl mt-1 focus:outline-none" placeholder="Optional Password">
                            </div>
                        </div>

                        <div>
                            <label class="font-bold text-purple-700">Application / Maqsad</label>
                            <input type="text" id="applicationType" class="w-full p-2.5 border border-purple-200 rounded-xl mt-1 focus:outline-none font-semibold" placeholder="e.g. Passport, Online Form">
                        </div>

                        <div class="grid grid-cols-3 gap-1.5 bg-gray-50 p-2.5 rounded-xl border border-dashed">
                            <div>
                                <label class="font-bold text-blue-600 block text-[10px]">Total Fee</label>
                                <input type="number" id="totalFee" class="w-full p-1.5 border rounded-lg mt-0.5 text-center font-bold text-sm" value="0">
                            </div>
                            <div>
                                <label class="font-bold text-green-600 block text-[10px]">Paid Amt</label>
                                <input type="number" id="paidAmount" class="w-full p-1.5 border rounded-lg mt-0.5 text-center font-bold text-sm" value="0">
                            </div>
                            <div>
                                <label class="font-bold text-red-500 block text-[10px]">Gahak Dues</label>
                                <input type="number" id="duesAmount" class="w-full p-1.5 border rounded-lg mt-0.5 text-center font-bold text-sm text-red-600" value="0">
                            </div>
                        </div>
                    </div>

                    <!-- Expense Fields -->
                    <div id="expenseFields" class="space-y-3 hidden">
                        <div>
                            <label class="font-bold text-gray-500">Kharche ki Tareekh</label>
                            <input type="date" id="expenseDate" class="w-full p-2.5 border border-gray-200 bg-gray-50 rounded-xl mt-1 font-bold">
                        </div>
                        <div>
                            <label class="font-bold text-gray-500">Kharche ki Tafseel</label>
                            <input type="text" id="expenseDetail" class="w-full p-2.5 border border-gray-200 rounded-xl mt-1" placeholder="Chai, Bill...">
                        </div>
                        <div>
                            <label class="font-bold text-gray-500">Kharche ki Raqam (Rs.)</label>
                            <input type="number" id="expenseAmount" class="w-full p-2.5 border border-gray-200 rounded-xl mt-1" value="0">
                        </div>
                    </div>

                    <!-- Common Field Locked -->
                    <div class="flex items-center justify-between bg-gray-100 px-3 py-2 rounded-xl text-[11px]">
                        <span class="font-bold text-gray-500">Operator:</span>
                        <input type="text" id="handler" required class="bg-transparent text-right font-black text-gray-700 outline-none cursor-not-allowed" readonly>
                    </div>
                    
                    <div class="flex space-x-2 pt-1">
                        <button type="submit" id="btnSubmit" class="flex-1 bg-green-600 text-white p-3 rounded-xl font-black shadow-xs active:scale-95 transition text-xs">
                            Data Save Karein
                        </button>
                        <button type="button" id="btnCancelEdit" onclick="cancelEditMode()" class="bg-gray-400 text-white p-3 rounded-xl font-bold active:scale-95 transition hidden">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>

            <!-- 🔍 FIXED & IMPROVED SEARCH BAR -->
            <div class="bg-white p-3 rounded-2xl shadow-xs border border-blue-200 flex items-center space-x-2 text-xs">
                <span class="text-blue-600 font-bold">🔍 Search:</span>
                <input type="text" id="tableSearchInput" placeholder="Naam, CNIC, ID ya Date likhein..." class="w-full p-2 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-400">
            </div>

            <!-- RECORD LIST -->
            <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                    <h2 class="text-xs font-black text-gray-500 uppercase tracking-wider">Khata Records List</h2>
                    <span class="text-[10px] bg-blue-100 text-blue-700 font-bold px-2 py-0.5 rounded-full">Live Connection</span>
                </div>
                
                <div id="dataTable" class="space-y-2">
                    <!-- Cards will render here -->
                </div>
            </div>

        </div>
    </div>

    <!-- Firebase SDK Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkKq8NhkJe3lfu83C7HrzitsZii5No9eg",
            authDomain: "myteamcontrole.firebaseapp.com",
            projectId: "myteamcontrole",
            storageBucket: "myteamcontrole.firebasestorage.app",
            messagingSenderId: "618519310380",
            appId: "1:618519310380:web:5597bccc6e3d0b86b7a189",
            measurementId: "G-E224LZD6TY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const dataCollection = collection(db, "team_data");

        const userNames = {
            "ghulammustafaansari160@gmail.com": "mustafa",
            "programmersukhera@gmail.com": "Shazad",
            "habibmaster485@gmail.com": "Habib",
            "hamzashopyt@gmail.com": "Hamza"
        };

        const CASHIER_EMAIL = "ghulammustafaansari160@gmail.com";
        let isCashier = false;
        let currentFilter = 'all'; 
        let cachedDocs = [];
        let unsubscribeSnapshot = null;

        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('clientDate').value = todayStr;
        document.getElementById('expenseDate').value = todayStr;

        // Search Input Event Listener to render instantly as user types
        document.getElementById('tableSearchInput').addEventListener('input', () => {
            renderTable();
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainInterface').classList.remove('hidden');
                isCashier = (user.email.toLowerCase() === CASHIER_EMAIL.toLowerCase());
                const currentName = userNames[user.email.toLowerCase()] || "Unknown User";
                document.getElementById('lblUserEmail').innerText = currentName;
                document.getElementById('handler').value = currentName;
                startRealtimeListener();
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainInterface').classList.add('hidden');
                if(unsubscribeSnapshot) unsubscribeSnapshot();
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) { alert("Login Error: " + error.message); }
        });

        document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

        window.switchTab = function(type) {
            document.getElementById('formType').value = type;
            const btnClient = document.getElementById('tabClient');
            const btnExpense = document.getElementById('tabExpense');
            
            if(type === 'client') {
                document.getElementById('clientFields').classList.remove('hidden');
                document.getElementById('expenseFields').classList.add('hidden');
                btnClient.className = "w-1/2 py-2 text-xs font-black text-center rounded-lg bg-white text-blue-600 shadow-xs transition";
                btnExpense.className = "w-1/2 py-2 text-xs font-bold text-center rounded-lg text-gray-500 transition";
            } else {
                document.getElementById('clientFields').classList.add('hidden');
                document.getElementById('expenseFields').classList.remove('hidden');
                btnExpense.className = "w-1/2 py-2 text-xs font-black text-center rounded-lg bg-white text-blue-600 shadow-xs transition";
                btnClient.className = "w-1/2 py-2 text-xs font-bold text-center rounded-lg text-gray-500 transition";
            }
        }

        window.filterTable = function(filterType) {
            currentFilter = filterType;
            renderTable();
        }

        document.getElementById('khataForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const type = document.getElementById('formType').value;
            const editId = document.getElementById('editDocId').value;
            let payload = { type: type, handler: document.getElementById('handler').value };
            
            if(type === 'client') {
                const total = parseFloat(document.getElementById('totalFee').value) || 0;
                const paid = parseFloat(document.getElementById('paidAmount').value) || 0;
                const dues = parseFloat(document.getElementById('duesAmount').value) || 0;
                let status = paid === 0 ? "Pending" : (dues > 0 ? "Dues" : "Complete");
                
                payload.clientDate = document.getElementById('clientDate').value;
                payload.clientName = document.getElementById('clientName').value;
                payload.cnic = document.getElementById('cnic').value;
                payload.trackingId = document.getElementById('trackingId').value;
                payload.mobileNumber = document.getElementById('mobileNumber').value;
                payload.recordPassword = document.getElementById('recordPassword').value;
                payload.applicationType = document.getElementById('applicationType').value;
                payload.totalFee = total;
                payload.paidAmount = paid;
                payload.duesAmount = dues;
                payload.status = status;
                
                if(!editId) {
                    payload.cashStatus = "Not Paid";
                    payload.operatorHandoverTime = "";
                    payload.cashVerified = false;
                    payload.paidBy = "";
                }
            } else {
                payload.expenseDate = document.getElementById('expenseDate').value;
                payload.expenseDetail = document.getElementById('expenseDetail').value;
                payload.expenseAmount = parseFloat(document.getElementById('expenseAmount').value) || 0;
            }

            try {
                if(editId) {
                    await updateDoc(doc(db, "team_data", editId), payload);
                    alert("Updated Successfully!");
                } else {
                    payload.createdBy = auth.currentUser.email;
                    payload.timestamp = new Date();
                    await addDoc(dataCollection, payload);
                    alert("Saved Successfully!");
                }
                cancelEditMode();
            } catch (error) { alert("Error: " + error.message); }
        });

        window.operatorHandover = async function(id) {
            if(confirm("Kya apne cashier ko paise pakra diye hain?")) {
                const now = new Date();
                const formattedTime = now.toLocaleDateString('en-GB') + " " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                await updateDoc(doc(db, "team_data", id), {
                    cashStatus: "Handed Over",
                    operatorHandoverTime: formattedTime
                });
            }
        }

        window.openEndorseModal = function(id) {
            document.getElementById('endorseDocId').value = id;
            document.getElementById('endorseModal').classList.remove('hidden');
        }
        window.closeEndorseModal = function() {
            document.getElementById('endorseModal').classList.add('hidden');
        }

        window.submitEndorsement = async function() {
            const id = document.getElementById('endorseDocId').value;
            const selectedPaidBy = document.getElementById('paidBySelect').value;
            const now = new Date();
            const formattedTime = now.toLocaleDateString('en-GB') + " " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            await updateDoc(doc(db, "team_data", id), {
                cashVerified: true,
                cashStatus: "Verified",
                paidBy: selectedPaidBy,
                verifiedAtTime: formattedTime
            });
            closeEndorseModal();
        }

        window.toggleDetailRow = function(id) {
            const el = document.getElementById("detail-" + id);
            el.classList.toggle("hidden");
        }

        function startRealtimeListener() {
            unsubscribeSnapshot = onSnapshot(dataCollection, (snapshot) => {
                cachedDocs = [];
                snapshot.forEach(docSnap => cachedDocs.push({ id: docSnap.id, data: docSnap.data() }));
                renderTable();
            });
        }

        // FULLY FIXED SEARCH LOGIC (LOWERCASE INSENSITIVE)
        function renderTable() {
            const container = document.getElementById('dataTable');
            const searchVal = document.getElementById('tableSearchInput').value.toLowerCase().trim();
            container.innerHTML = "";
            
            let totalVerifiedProfit = 0, totalPendingCash = 0, totalOfficeExpenses = 0, grandTotalDues = 0;
            
            cachedDocs.forEach((item) => {
                const data = item.data;
                const id = item.id;
                
                let rawDate = data.clientDate || data.expenseDate || "";
                let displayDate = "";
                if(rawDate) {
                    const parts = rawDate.split("-");
                    if(parts.length === 3) displayDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
                }

                // Super Search Match Fix
                if (searchVal) {
                    const cName = (data.clientName || "").toLowerCase();
                    const cnicNo = (data.cnic || "").toLowerCase();
                    const tId = (data.trackingId || "").toLowerCase();
                    const expDet = (data.expenseDetail || "").toLowerCase();
                    const appType = (data.applicationType || "").toLowerCase();
                    const mobNo = (data.mobileNumber || "").toLowerCase();
                    const handlerName = (data.handler || "").toLowerCase();
                    const dStr = displayDate.toLowerCase();
                    
                    if (!cName.includes(searchVal) && 
                        !cnicNo.includes(searchVal) && 
                        !tId.includes(searchVal) && 
                        !dStr.includes(searchVal) && 
                        !expDet.includes(searchVal) && 
                        !appType.includes(searchVal) &&
                        !mobNo.includes(searchVal) &&
                        !handlerName.includes(searchVal)) {
                        return; // Agar match na kare toh is record ko skip kardo
                    }
                }

                let singleProfit = 0;
                if(data.type !== 'expense') {
                    singleProfit = (data.totalFee - data.duesAmount) - data.paidAmount;
                    if(data.cashVerified === true) totalVerifiedProfit += singleProfit;
                    else totalPendingCash += singleProfit;
                    grandTotalDues += parseFloat(data.duesAmount) || 0;
                } else {
                    totalOfficeExpenses += parseFloat(data.expenseAmount) || 0;
                }

                if(currentFilter === 'dues' && (data.type === 'expense' || data.duesAmount <= 0)) return;
                if(currentFilter === 'expense' && data.type !== 'expense') return;
                if(currentFilter === 'pending_cash' && (data.type === 'expense' || data.cashVerified === true)) return;

                const card = document.createElement('div');
                
                if(data.type === 'expense') {
                    card.className = "bg-red-50 border border-red-200 rounded-xl p-3 text-xs flex justify-between items-center";
                    card.innerHTML = `
                        <div>
                            <p class="font-black text-red-800">💸 KHARCHA: ${data.expenseDetail}</p>
                            <p class="text-[10px] text-gray-500 mt-0.5">📅 ${displayDate} | By: ${data.handler}</p>
                            <p class="text-sm font-black text-red-600 mt-1">Rs. ${data.expenseAmount}</p>
                        </div>
                        <div class="space-y-1 flex flex-col">
                            <button onclick="editRecord('${id}')" class="bg-blue-500 text-white px-2 py-1 rounded-lg font-bold text-[10px]">Edit</button>
                            <button onclick="deleteRecord('${id}')" class="bg-red-500 text-white px-2 py-1 rounded-lg font-bold text-[10px]">Del</button>
                        </div>
                    `;
                    container.appendChild(card);
                    return;
                }

                let lockStatusHTML = "";
                if(data.cashStatus === "Verified" || data.cashVerified === true) {
                    lockStatusHTML = `<span class="text-green-700 font-bold block text-[11px]">✅ Cash Verified (By: ${data.paidBy})</span>`;
                } else if(data.cashStatus === "Handed Over") {
                    if(isCashier) {
                        lockStatusHTML = `
                            <div class="mt-2 bg-amber-50 p-2 rounded-lg border border-amber-200">
                                <p class="text-amber-800 font-bold text-[10px] mb-1">⏳ Received Request (${data.operatorHandoverTime})</p>
                                <button onclick="openEndorseModal('${id}')" class="w-full bg-amber-500 text-white py-1 rounded-md text-[10px] font-black">Approve Cash</button>
                            </div>
                        `;
                    } else {
                        lockStatusHTML = `<span class="text-amber-600 font-bold block text-[10px] mt-1 animate-pulse">⏳ Waiting Cashier Lock...</span>`;
                    }
                } else {
                    if(!isCashier) {
                        lockStatusHTML = `<button onclick="operatorHandover('${id}')" class="mt-2 w-full bg-blue-500 text-white py-1 rounded-lg text-[10px] font-black">💸 Hand over Cash</button>`;
                    } else {
                        lockStatusHTML = `<span class="text-gray-400 italic block text-[10px] mt-1">Cash not sent yet</span>`;
                    }
                }

                card.className = "bg-white border border-gray-100 rounded-xl shadow-xs overflow-hidden";
                card.innerHTML = `
                    <div class="p-3 bg-white" onclick="toggleDetailRow('${id}')">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-black text-blue-600 text-sm">👤 ${data.clientName}</h3>
                                <p class="text-[10px] text-gray-400 font-semibold mt-0.5">🆔 CNIC: ${data.cnic || 'N/A'}</p>
                                <p class="text-[10px] text-gray-400 font-semibold">🔍 Track ID: ${data.trackingId || 'N/A'}</p>
                            </div>
                            <span class="text-[10px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded-md font-bold">📅 ${displayDate}</span>
                        </div>
                    </div>
                    
                    <div id="detail-${id}" class="hidden bg-gray-50 border-t p-3 space-y-2 text-[11px] border-dashed">
                        <div class="grid grid-cols-2 gap-2 text-gray-600">
                            <div>
                                <p><strong>📂 Job Type:</strong> ${data.applicationType || 'N/A'}</p>
                                <p><strong>📞 Phone:</strong> ${data.mobileNumber || 'N/A'}</p>
                                <p><strong>🔑 Password:</strong> <span class="text-purple-700 font-bold">${data.recordPassword || 'None'}</span></p>
                                <p><strong>👤 Operator:</strong> ${data.handler}</p>
                            </div>
                            <div class="bg-white p-2 rounded-lg border text-[10px] space-y-0.5 font-semibold">
                                <p>Total Fee: Rs. ${data.totalFee}</p>
                                <p class="text-blue-600">Paid Out: Rs. ${data.paidAmount}</p>
                                <p class="text-red-500">Dues Out: Rs. ${data.duesAmount}</p>
                                <p class="text-green-600 font-bold border-t pt-0.5">Profit: Rs. ${singleProfit}</p>
                            </div>
                        </div>
                        <div class="pt-1">${lockStatusHTML}</div>
                        <div class="flex space-x-2 justify-end pt-2 border-t text-[10px]">
                            <button onclick="editRecord('${id}')" class="bg-blue-600 text-white px-3 py-1 rounded-md font-bold">Edit</button>
                            <button onclick="deleteRecord('${id}')" class="bg-red-500 text-white px-3 py-1 rounded-md font-bold">Delete</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            
            let netVerifiedProfit = totalVerifiedProfit - totalOfficeExpenses;
            document.getElementById('totalProfitDisplay').innerText = "Rs. " + netVerifiedProfit;
            document.getElementById('totalPendingCashDisplay').innerText = "Rs. " + totalPendingCash;
            document.getElementById('totalExpenseDisplay').innerText = "Rs. " + totalOfficeExpenses;
            document.getElementById('totalBalanceDisplay').innerText = "Rs. " + grandTotalDues;
        }

        window.editRecord = function(id) {
            const match = cachedDocs.find(item => item.id === id);
            if(!match) return;
            const data = match.data;
            document.getElementById('editDocId').value = id;
            document.getElementById('handler').value = data.handler || '';
            switchTab(data.type);

            if(data.type === 'client') {
                document.getElementById('clientDate').value = data.clientDate || todayStr;
                document.getElementById('clientName').value = data.clientName || '';
                document.getElementById('cnic').value = data.cnic || '';
                document.getElementById('trackingId').value = data.trackingId || '';
                document.getElementById('mobileNumber').value = data.mobileNumber || '';
                document.getElementById('recordPassword').value = data.recordPassword || '';
                document.getElementById('applicationType').value = data.applicationType || '';
                document.getElementById('totalFee').value = data.totalFee || 0;
                document.getElementById('paidAmount').value = data.paidAmount || 0;
                document.getElementById('duesAmount').value = data.duesAmount || 0;
            } else {
                document.getElementById('expenseDate').value = data.expenseDate || todayStr;
                document.getElementById('expenseDetail').value = data.expenseDetail || '';
                document.getElementById('expenseAmount').value = data.expenseAmount || 0;
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
            document.getElementById('btnSubmit').innerText = "Update Karein";
            document.getElementById('btnCancelEdit').classList.remove('hidden');
        }

        window.cancelEditMode = function() {
            document.getElementById('khataForm').reset();
            document.getElementById('editDocId').value = "";
            document.getElementById('btnSubmit').innerText = "Data Save Karein";
            document.getElementById('btnCancelEdit').classList.add('hidden');
            document.getElementById('clientDate').value = todayStr;
            document.getElementById('expenseDate').value = todayStr;
            switchTab('client');
        }

        window.deleteRecord = async (id) => {
            if(confirm("Mita dein ye record?")) { await deleteDoc(doc(db, "team_data", id)); }
        }
    </script>
</body>
</html>
